<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统安全检测中…</title>
    <style>
        body {
            background: #0f1220;
            color: #00ffcc;
            font-family: Consolas, monospace;
            text-align: center;
            padding-top: 60px;
        }
        .box {
            width: 80%;
            max-width: 500px;
            margin: auto;
            border: 1px solid #00ffcc;
            padding: 30px;
            box-shadow: 0 0 20px #00ffcc;
        }
        .bar {
            width: 100%;
            height: 20px;
            border: 1px solid #00ffcc;
            margin-top: 20px;
            position: relative;
        }
        .bar span {
            display: block;
            height: 100%;
            width: 0%;
            background: #00ffcc;
            animation: load 4s forwards;
        }
        @keyframes load {
            to { width: 100%; }
        }
        .hidden {
            display: none;
            margin-top: 20px;
            font-size: 22px;
            color: #ff4d4d;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>⚠️系统检测中</h2>
    <p>正在扫描你的设备，请不要关闭页面…</p>

    <div class="bar">
        <span></span>
    </div>

    <p id="percent">0%</p>

    <div id="prank" class="hidden">
        支付成功<br><br>
        感谢您的支持！<br>
        <strong>谢谢！</strong><br><br>
    </div>
</div>

<script>
    let p = 0;
    const percent = document.getElementById("percent");
    const prank = document.getElementById("prank");

    const timer = setInterval(() => {
        p += Math.floor(Math.random() * 15);
        if (p >= 100) {
            p = 100;
            clearInterval(timer);
            setTimeout(() => {
                prank.style.display = "block";
                percent.style.display = "none";
            }, 500);
        }
        percent.innerText = p + "%";
    }, 400);
</script>

</body>
</html>
