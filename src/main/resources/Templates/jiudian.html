<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>预订成功｜云境·臻选酒店</title>
    <style>
        body {
            margin: 0;
            background: #f5f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", Arial;
            color: #333;
        }
        .card {
            max-width: 620px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }.header {
             background: linear-gradient(135deg, #f2f2f2, #e6e6e6);
             color: #333;
             padding: 26px;
         }
        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .header h1 {
            font-weight: 700;
        }
        .header p {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.85;
        }
        .success {
            background: #f0faf6;
            color: #1a7f5a;
            padding: 16px 26px;
            font-size: 15px;
            border-bottom: 1px solid #e6f2ed;
        }
        .section {
            padding: 26px;
            border-bottom: 1px solid #f0f0f0;
        }
        .section h2 {
            font-size: 17px;
            margin-bottom: 14px;
            color: #222;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .row span:first-child {
            color: #666;
        }
        .highlight {
            color: #b88a2d;
            font-weight: 600;
        }
        .notice {
            background: #fff7e6;
            color: #8a5a00;
            padding: 18px 26px;
            font-size: 14px;
            line-height: 1.6;
        }
        .footer {
            padding: 20px 26px;
            font-size: 13px;
            color: #888;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="header">
        <h1>云境 · 臻选酒店</h1>
        <p>YUNJING PREMIUM HOTEL</p>
    </div>

    <div class="success">
        ✔ 您的订单已预订成功，期待您的入住
    </div>

    <div class="section">
        <h2>入住信息</h2>
        <div class="row">
            <span>房型</span>
            <span class="highlight">情趣大床房 · 私享系列</span>
        </div>
        <div class="row">
            <span>床型</span>
            <span>2.0m 超大圆床</span>
        </div>
        <div class="row">
            <span>入住日期</span>
            <span>2026-02-24</span>
        </div>
        <div class="row">
            <span>离店日期</span>
            <span>2026-02-25</span>
        </div>
    </div>

    <div class="section">
        <h2>预订人信息</h2>
        <div class="row">
            <span>姓名</span>
            <span th:text="${customerName} ?: '张義诚先生'">先生</span>
        </div>
        <div class="row">
            <span>手机号</span>
            <span th:text="${customerPhone} ?: '178 **** 2316'"></span>
        </div>
        <div class="row">
            <span>订单编号</span>
            <span>YJ202602140018</span>
        </div>
    </div>

    <div class="section">
        <h2>费用明细</h2>
        <div class="row">
            <span>房费（1晚）</span>
            <span>¥ 198.00</span>
        </div>
        <div class="row">
            <span>服务费</span>
            <span>¥ 0.00</span>
        </div>
        <div class="row">
            <span>实付金额</span>
            <span class="highlight">¥ 198.00</span>
        </div>
    </div>

    <div class="notice">
        温馨提示：<br>
        · 本房型为私密主题房，仅限成年人入住<br>
        · 请携带有效身份证件办理入住<br>
        · 酒店将对您的隐私信息严格保密
    </div>

    <div class="footer">
        本邮件为系统自动发送，请勿直接回复<br>
        © 云境 · 臻选酒店
    </div>

</div>

</body>
<script>
</script>
</html>
